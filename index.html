<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Bolão Lotofácil</title>
</head>
<body style="margin:0;padding:0;background:#F7F3ED;">
<style>
  :root{
    --paper:#F7F3ED;
    --card:#FFFFFF;
    --ink:#241629;
    --plum:#3D1740;
    --plum-2:#57235C;
    --magenta:#C81E78;
    --magenta-dark:#8E1054;
    --gold:#C6931B;
    --gold-bg:#FBF0D6;
    --line:#E4DAE2;
    --muted:#8A7B8E;
    --danger:#B93B3B;
    --sel-bg:#EAF3DE;
    --sel-line:#B9D687;
    --sel-text:#3B6D11;
    --hit:#C4231F;
    --hit-dark:#8A1815;
  }
  *{box-sizing:border-box;}
  .bl-app{
    font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
    background:var(--paper);
    color:var(--ink);
    border-radius:16px;
    padding:0;
    max-width:720px;
    margin:0 auto;
    border:1px solid var(--line);
    overflow:hidden;
  }
  .bl-num{font-family:'SF Mono',ui-monospace,'Courier New',monospace;}
  .bl-header{
    background:linear-gradient(180deg,var(--plum),var(--plum-2));
    color:#F3E9F4;
    padding:22px 24px 20px;
  }
  .bl-eyebrow{
    font-size:11px;
    letter-spacing:.14em;
    text-transform:uppercase;
    color:#D7A9DD;
    margin:0 0 6px;
    font-weight:600;
  }
  .bl-title{
    font-family:Georgia,'Times New Roman',serif;
    font-size:26px;
    font-weight:700;
    margin:0 0 4px;
  }
  .bl-sub{font-size:13px;color:#D7BEDA;margin:0;}
  .bl-lockbar{
    display:flex;align-items:center;justify-content:space-between;
    padding:10px 24px;background:#2C0F2E;color:#EADCEA;font-size:12.5px;
    position:fixed;top:0;left:0;right:0;max-width:720px;margin:0 auto;
    z-index:1000;flex-wrap:wrap;gap:8px;
    box-shadow:0 4px 14px rgba(0,0,0,.28);
  }
  .bl-lockbar-spacer{width:100%;}
  .bl-lock-btn{
    background:transparent;border:1px solid #6C3E70;color:#EADCEA;
    padding:6px 12px;border-radius:20px;font-size:12px;cursor:pointer;
    display:inline-flex;align-items:center;gap:6px;
  }
  .bl-lock-btn:hover{background:#3E1B41;}
  .bl-lock-btn.on{border-color:var(--gold);color:var(--gold);}
  .bl-tabs{display:flex;border-bottom:1px solid var(--line);background:var(--card);}
  .bl-tab{
    flex:1;padding:13px 10px;text-align:center;font-size:14px;font-weight:600;
    color:var(--muted);cursor:pointer;border-bottom:2px solid transparent;background:none;border-top:none;border-left:none;border-right:none;
  }
  .bl-tab.active{color:var(--magenta-dark);border-bottom-color:var(--magenta);}
  .bl-body{padding:18px 20px 24px;background:var(--paper);min-height:200px;}
  .bl-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px;}
  .bl-stat{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:10px 12px;}
  .bl-stat.premio{background:var(--gold-bg);border-color:#EBD9A6;}
  .bl-stat.premio .bl-stat-val{color:#8F6B12;}
  .bl-stat-label{font-size:10.5px;color:var(--muted);text-transform:uppercase;letter-spacing:.05em;margin:0 0 3px;}
  .bl-stat-val{font-size:19px;font-weight:700;color:var(--plum);margin:0;}
  .bl-toolbar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .bl-input{
    flex:1;padding:9px 12px;border:1px solid var(--line);border-radius:8px;
    font-size:13.5px;background:var(--card);color:var(--ink);min-width:120px;
  }
  .bl-input:focus{outline:none;border-color:var(--magenta);}
  textarea.bl-input{resize:vertical;min-height:90px;width:100%;box-sizing:border-box;font-family:'SF Mono',ui-monospace,monospace;line-height:1.5;}
  select.bl-input{flex:none;width:auto;}
  .bl-btn{
    padding:9px 15px;border-radius:8px;border:1px solid var(--plum);
    background:var(--plum);color:#F3E9F4;font-size:13px;font-weight:600;
    cursor:pointer;white-space:nowrap;
  }
  .bl-btn:hover{background:var(--plum-2);}
  .bl-btn.secondary{background:var(--card);color:var(--plum);border-color:var(--line);}
  .bl-btn.secondary:hover{background:#F0E9F0;}
  .bl-btn.danger{background:var(--card);color:var(--danger);border-color:#EAC9C9;}
  .bl-btn.danger:hover{background:#FBEDED;}
  .bl-btn.gold{background:var(--gold);border-color:#8F6B12;color:#fff;}
  .bl-btn.gold:hover{filter:brightness(1.06);}
  .bl-btn:disabled{opacity:.45;cursor:not-allowed;}
  .bl-card{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:13px 14px;margin-bottom:10px;
  }
  .bl-card.sel{background:var(--sel-bg);border-color:var(--sel-line);}
  .bl-draw-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px;gap:8px;}
  .bl-draw-concurso{font-size:14.5px;font-weight:700;color:var(--plum);}
  .bl-draw-date{font-size:11.5px;color:var(--muted);}
  .bl-badge{
    font-size:10.5px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    padding:3px 9px;border-radius:20px;background:#F0E9F0;color:var(--plum);white-space:nowrap;
  }
  .bl-badge.sel{background:var(--sel-text);color:#fff;}
  .bl-grid5{display:grid;grid-template-columns:repeat(5,1fr);gap:4px;max-width:220px;}
  .bl-ball{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;
    border-radius:50%;font-size:11px;font-weight:600;
    border:1px solid var(--line);color:var(--muted);background:#FBF9F6;
  }
  .bl-ball.on{
    background:var(--magenta);color:#fff;border-color:var(--magenta-dark);
  }
  .bl-card.sel .bl-ball.on{background:var(--sel-text);border-color:#27500A;}
  .bl-ball.hit{
    background:var(--hit);border:2px solid var(--hit-dark);color:#fff;
    box-shadow:0 0 0 3px rgba(196,35,31,.28),0 2px 5px rgba(138,24,21,.5);
    font-weight:800;transform:scale(1.14);position:relative;z-index:1;
  }
  .bl-acertos-badge{
    font-size:12px;font-weight:700;padding:3px 10px;border-radius:20px;white-space:nowrap;
    background:#F0E9F0;color:var(--plum);
  }
  .bl-acertos-badge.premio{background:var(--gold);color:#fff;}
  .bl-result-panel{
    background:var(--card);border:1px solid var(--line);border-radius:12px;padding:15px 16px;margin-bottom:16px;
  }
  .bl-result-panel h3{font-size:14px;margin:0 0 8px;color:var(--plum);}
  .bl-result-empty{font-size:12.5px;color:var(--muted);}
  .bl-legend{display:flex;gap:14px;font-size:11px;color:var(--muted);margin-top:8px;flex-wrap:wrap;}
  .bl-legend span{display:inline-flex;align-items:center;gap:5px;}
  .bl-legend-dot{width:11px;height:11px;border-radius:50%;display:inline-block;}
  .bl-mini-balls{display:flex;flex-wrap:wrap;gap:4px;}
  .bl-mini-ball{
    width:24px;height:24px;border-radius:50%;background:var(--plum);color:#fff;
    font-size:10px;font-weight:700;display:flex;align-items:center;justify-content:center;
    font-family:'SF Mono',ui-monospace,monospace;
  }
  .bl-empty{
    text-align:center;padding:32px 16px;color:var(--muted);font-size:13.5px;
  }
  .bl-note{
    font-size:12px;color:var(--muted);background:var(--gold-bg);border:1px solid #EBD9A6;
    border-radius:8px;padding:9px 11px;margin-bottom:14px;line-height:1.5;
  }
  .bl-announce-wrap{padding:14px 20px 0;}
  @keyframes blAnnouncePop{
    0%{opacity:0;transform:translateY(-6px) scale(.97);}
    60%{opacity:1;transform:translateY(1px) scale(1.01);}
    100%{opacity:1;transform:translateY(0) scale(1);}
  }
  @keyframes blAnnounceGlow{
    0%,100%{box-shadow:0 4px 16px rgba(200,30,120,.22),0 0 0 1px rgba(200,30,120,.18);}
    50%{box-shadow:0 4px 20px rgba(200,30,120,.38),0 0 0 1px rgba(200,30,120,.30);}
  }
  .bl-announce{display:flex;gap:10px;align-items:flex-start;animation:blAnnouncePop .35s ease-out;}
  .bl-announce-avatar{
    flex:none;width:38px;height:38px;border-radius:50%;
    background:linear-gradient(135deg,var(--magenta),var(--gold));color:#fff;
    display:flex;align-items:center;justify-content:center;font-size:17px;
    box-shadow:0 3px 10px rgba(200,30,120,.4);
    border:2px solid #fff;
  }
  .bl-announce-bubble{
    position:relative;flex:1;min-width:0;
    background:linear-gradient(180deg,#FFF7FB,#FFEFF7);
    border:1.5px solid var(--magenta);
    border-radius:4px 18px 18px 18px;
    padding:11px 34px 11px 14px;
    animation:blAnnounceGlow 2.4s ease-in-out 1;
    box-shadow:0 4px 16px rgba(200,30,120,.22),0 0 0 1px rgba(200,30,120,.18);
  }
  .bl-announce-label{
    display:inline-block;font-size:10px;letter-spacing:.07em;text-transform:uppercase;
    color:#fff;font-weight:800;margin:0 0 5px;background:var(--magenta);
    padding:2px 8px;border-radius:20px;
  }
  .bl-announce-text{margin:0;white-space:pre-line;word-break:break-word;color:var(--ink);font-size:13.5px;font-weight:600;line-height:1.5;}
  .bl-announce-close{
    position:absolute;top:8px;right:8px;
    flex:none;background:#fff;border:1px solid var(--magenta);color:var(--magenta-dark);
    width:21px;height:21px;border-radius:50%;cursor:pointer;font-size:11px;line-height:1;font-weight:700;
    display:flex;align-items:center;justify-content:center;
  }
  .bl-announce-close:hover{background:var(--magenta);color:#fff;}
  .bl-list-table{width:100%;border-collapse:collapse;font-size:12.5px;}
  .bl-list-table th,.bl-list-table td{text-align:left;padding:8px 8px;border-bottom:1px solid var(--line);vertical-align:middle;}
  .bl-list-table th{color:var(--muted);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;}
  .bl-list-table td.bl-num{white-space:nowrap;}
  .bl-list-dezenas{font-family:'SF Mono',ui-monospace,'Courier New',monospace;font-size:11.5px;color:var(--ink);word-break:break-word;}
  .bl-list-status{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;background:#F0E9F0;color:var(--plum);white-space:nowrap;}
  .bl-list-status.sel{background:var(--sel-text);color:#fff;}
  .bl-list-acertos{font-size:11.5px;font-weight:700;color:var(--plum);white-space:nowrap;}
  .bl-list-acertos.premio{color:#8F6B12;}
  .bl-panel{
    background:var(--card);border:1px solid var(--line);border-radius:12px;
    padding:16px;margin-bottom:16px;
  }
  .bl-panel h3{font-size:14px;margin:0 0 4px;color:var(--plum);}
  .bl-hint{font-size:12px;color:var(--muted);margin:0 0 12px;line-height:1.45;}
  .bl-field{margin-bottom:10px;}
  .bl-field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px;font-weight:600;}
  .bl-pick-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin:6px 0 10px;max-width:280px;}
  .bl-pick{
    aspect-ratio:1;border-radius:50%;border:1px solid var(--line);background:#FBF9F6;
    color:var(--ink);font-size:12.5px;font-weight:600;cursor:pointer;
  }
  .bl-pick.sel{background:var(--magenta);color:#fff;border-color:var(--magenta-dark);}
  .bl-pick-count{font-size:12px;color:var(--muted);margin-bottom:8px;}
  .bl-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center;}
  .bl-participant{
    display:flex;align-items:center;justify-content:space-between;
    background:var(--card);border:1px solid var(--line);border-radius:9px;
    padding:7px 12px;margin-bottom:5px;
  }
  .bl-p-name{font-size:14px;font-weight:600;color:var(--ink);margin:0 0 1px;}
  .bl-p-meta{font-size:11.5px;color:var(--muted);margin:0;}
  .bl-p-cotas{
    font-size:15px;font-weight:700;color:var(--plum);background:var(--gold-bg);
    border:1px solid #EBD9A6;border-radius:20px;padding:3px 12px;
  }
  .bl-modal-wrap{
    position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(36,22,41,.55);
    display:flex;align-items:center;justify-content:center;padding:24px;
    z-index:2000;overflow-y:auto;
  }
  .bl-modal{
    background:var(--card);border-radius:12px;padding:20px;max-width:300px;width:100%;
  }
  .bl-modal h4{margin:0 0 4px;font-size:15px;color:var(--plum);}
  .bl-modal p{margin:0 0 12px;font-size:12.5px;color:var(--muted);line-height:1.5;}
  .bl-error{color:var(--danger);font-size:12px;margin-top:6px;min-height:14px;white-space:pre-line;}
  .bl-check-toggle{
    display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer;user-select:none;
  }
  .bl-icon-del{
    background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px;padding:4px 6px;
  }
  .bl-icon-del:hover{color:var(--danger);}
  .bl-preview-row{
    display:flex;align-items:center;gap:10px;padding:8px 4px;border-bottom:1px solid var(--line);
  }
  .bl-preview-row:last-child{border-bottom:none;}
  .bl-preview-idx{width:22px;font-size:11px;color:var(--muted);font-family:'SF Mono',ui-monospace,monospace;}
  .bl-preview-meta{font-size:11px;color:var(--muted);margin-left:auto;white-space:nowrap;}
  .bl-preview-row.dup{opacity:.6;}
  .bl-dup-badge{
    font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.03em;
    background:#F3DAD3;color:var(--danger);padding:2px 8px;border-radius:20px;white-space:nowrap;margin-left:auto;
  }
  .bl-file-label{
    display:inline-flex;align-items:center;padding:9px 15px;border-radius:8px;border:1px solid var(--line);
    background:var(--card);color:var(--plum);font-size:13px;font-weight:600;cursor:pointer;
  }
  .bl-file-label:hover{background:#F0E9F0;}

  .pn-ball-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:8px;max-width:300px;}
  .pn-ball{
    aspect-ratio:1;display:flex;align-items:center;justify-content:center;flex-direction:column;
    border-radius:50%;font-size:12px;font-weight:700;font-family:'SF Mono',ui-monospace,monospace;
    border:1px solid var(--line);background:#FBF9F6;color:var(--ink);user-select:none;
  }
  .pn-ball.selectable{cursor:pointer;}
  .pn-ball.selectable:hover{border-color:var(--magenta);}
  .pn-ball.in-pool{background:var(--gold);border-color:#8F6B12;color:#fff;}
  .pn-ball small{font-size:8px;font-weight:400;display:block;}
  .pn-table{width:100%;border-collapse:collapse;font-size:12.5px;margin-top:10px;}
  .pn-table th,.pn-table td{text-align:left;padding:5px 8px;border-bottom:1px solid var(--line);font-family:'SF Mono',ui-monospace,monospace;}
  .pn-table th{color:var(--muted);font-family:-apple-system,sans-serif;font-size:10.5px;text-transform:uppercase;}
  .pn-disabled-note{font-size:12px;color:var(--muted);}

  .pt-block{border-top:1px dashed var(--line);padding-top:14px;margin-top:14px;}
  .pt-block:first-of-type{border-top:none;padding-top:0;margin-top:0;}
  .pt-block-head{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:2px;}
  .pt-block-title{font-size:13px;font-weight:700;color:var(--plum);margin:0 0 3px;}
  .pt-block-sub{font-size:11.5px;color:var(--muted);margin:0;line-height:1.5;}
  .pt-apply-summary{
    font-size:12px;color:var(--plum);background:var(--gold-bg);border:1px solid #EBD9A6;
    border-radius:8px;padding:8px 11px;margin-top:12px;line-height:1.5;
  }

  @media (max-width: 560px){
    html, body{overflow-x:hidden;}
    .bl-app{border-radius:0;border:none;max-width:100%;width:100%;margin:0;}
    .bl-header{padding:16px 16px 13px;}
    .bl-title{font-size:21px;}
    .bl-eyebrow{font-size:10px;}
    .bl-sub{font-size:12px;line-height:1.4;}
    .bl-lockbar{padding:9px 14px;flex-wrap:wrap;gap:6px;font-size:11.5px;}
    .bl-lock-btn{padding:5px 10px;font-size:11.5px;}
    .bl-tabs .bl-tab{font-size:12px;padding:11px 3px;}
    .bl-body{padding:14px 14px 24px;}
    .bl-panel{padding:13px;}
    .bl-panel h3{font-size:13.5px;}
    .bl-stats{gap:6px;}
    .bl-stat{padding:8px 9px;}
    .bl-stat-label{font-size:9.5px;}
    .bl-stat-val{font-size:16px;}
    .bl-toolbar{flex-direction:column;align-items:stretch;}
    .bl-toolbar .bl-input, .bl-toolbar select.bl-input{width:100%;flex:none;}
    .bl-row{gap:6px;}
    .bl-row .bl-field{min-width:0;}
    .bl-daterow{flex-direction:column;align-items:stretch;}
    .bl-daterow .bl-field{flex:none;width:100%;}
    .bl-daterow .bl-btn{width:100%;}
    .bl-btn, .bl-file-label{white-space:normal;text-align:center;flex:1 1 auto;line-height:1.3;}
    .bl-check-toggle{flex-wrap:wrap;}
    .pn-ball-grid, .bl-pick-grid, .bl-grid5{max-width:100%;}
    .bl-mini-balls{gap:3px;}
    .bl-mini-ball{width:22px;height:22px;font-size:9.5px;}
    .pn-table{font-size:11.5px;}
    .pn-table th, .pn-table td{padding:4px 6px;}
    .bl-modal{max-width:100%;}
    .bl-announce-wrap{padding:12px 14px 0;}
    .bl-announce-bubble{padding:9px 30px 9px 10px;font-size:12.5px;}
    .bl-list-table{font-size:11px;}
    .bl-list-table th,.bl-list-table td{padding:6px 5px;}
    .bl-list-dezenas{font-size:10px;}
  }
</style>
<div class="bl-app" id="blApp">
  <div class="bl-lockbar" id="blLockbar">
    <span id="blLockStatus">Modo participante — apenas visualização</span>
    <button class="bl-lock-btn" id="blLockBtn" type="button">Sou o organizador</button>
  </div>
  <div class="bl-lockbar-spacer" id="blLockbarSpacer"></div>
  <div class="bl-header">
    <div class="bl-row" id="blHeaderTop" style="justify-content:space-between;align-items:flex-start;">
      <div>
        <p class="bl-eyebrow" id="blEyebrow">Bolão de grupo</p>
        <h1 class="bl-title" id="blTitle">Lotofácil 2026</h1>
      </div>
      <button class="bl-btn secondary" id="blEditTitleBtn" type="button" style="display:none;font-size:11.5px;padding:6px 10px;">Editar nome</button>
    </div>
    <div id="blEditTitleForm" style="display:none;"></div>
    <p class="bl-sub" id="blSub">Carregando...</p>
  </div>
  <div class="bl-tabs">
    <button class="bl-tab" data-tab="gerador" type="button">Gerador de jogos</button>
    <button class="bl-tab active" data-tab="jogos" type="button">Nossos jogos</button>
    <button class="bl-tab" data-tab="palpites" type="button">Meus palpites</button>
    <button class="bl-tab" data-tab="participantes" type="button">Participantes</button>
  </div>
  <div id="blNotice"></div>
  <div class="bl-body" id="blBody"></div>
</div>

  firebase.initializeApp(firebaseConfig);
  var db = firebase.firestore();
  var FS_COLLECTION = 'bolao_lotofacil'; // pode trocar o nome se quiser

  // Implementa a MESMA interface que o app já usa (window.storage.get/set/delete/list),
  // só que agora falando de verdade com o Firestore (dados compartilhados) e
  // com o localStorage do navegador (dados pessoais, ex: sessão do organizador).

    get: async function(key, shared){

function loadJsPDF(){
  return new Promise(function(resolve, reject){
    if(window.jspdf && window.jspdf.jsPDF){ resolve(); return; }
    var existing = document.getElementById('blJsPdfScript');
    if(existing){
      existing.addEventListener('load', function(){ resolve(); });
      existing.addEventListener('error', function(){ reject(new Error('load-fail')); });
      return;
    }
    var s = document.createElement('script');
    s.id = 'blJsPdfScript';
    s.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    s.onload = function(){ resolve(); };
    s.onerror = function(){ reject(new Error('load-fail')); };
    document.head.appendChild(s);
  });
}

function baixarJogosPDF(btn){
  if(!state.jogos.length) return;
  var originalLabel = btn ? btn.textContent : '';
  if(btn){ btn.disabled = true; btn.textContent = 'Gerando PDF\u2026'; }

  loadJsPDF().then(function(){
    var jsPDFCtor = window.jspdf.jsPDF;
    var doc = new jsPDFCtor({ unit: 'pt', format: 'a4' });
    var pageWidth = doc.internal.pageSize.getWidth();
    var pageHeight = doc.internal.pageSize.getHeight();
    var margin = 42;
    var y = 54;

    var ordered = state.jogos.slice().sort(function(a,b){ return new Date(a.criadoEm) - new Date(b.criadoEm); });
    var selecionados = ordered.filter(function(j){ return j.selecionado; }).length;

    function drawHeader(){
      doc.setFillColor(61, 23, 64);
      doc.rect(0, 0, pageWidth, 62, 'F');
      doc.setTextColor(255,255,255);
      doc.setFont('helvetica','bold');
      doc.setFontSize(16);
      doc.text(state.appTitle.title + ' \u2014 Nossos jogos', margin, 32);
      doc.setFont('helvetica','normal');
      doc.setFontSize(9.5);
      doc.text('Gerado em ' + new Date().toLocaleString('pt-BR') + '  \u00b7  ' + ordered.length + ' jogo(s) no total  \u00b7  ' + selecionados + ' selecionado(s) para o bol\u00e3o', margin, 48);
      doc.setTextColor(30,20,30);
      y = 84;
    }
    function drawFooter(){
      var pageCount = doc.internal.getNumberOfPages();
      for(var i=1;i<=pageCount;i++){
        doc.setPage(i);
        doc.setFont('helvetica','normal');
        doc.setFontSize(8);
        doc.setTextColor(140,130,140);
        doc.text('P\u00e1gina ' + i + ' de ' + pageCount, pageWidth - margin, pageHeight - 20, { align: 'right' });
        doc.text('Cada sorteio \u00e9 independente \u2014 jogue com modera\u00e7\u00e3o.', margin, pageHeight - 20);
      }
    }

    drawHeader();

    ordered.forEach(function(j, idx){
      if(y > pageHeight - 70){
        doc.addPage();
        drawHeader();
      }
      var num = idx + 1;
      var dezenas = j.numeros.map(function(n){ return String(n).padStart(2,'0'); }).join('  ');

      doc.setDrawColor(230,222,230);
      doc.setFillColor(j.selecionado ? 253 : 250, j.selecionado ? 245 : 249, j.selecionado ? 250 : 246);
      doc.roundedRect(margin, y - 14, pageWidth - margin*2, 34, 4, 4, 'FD');

      doc.setFont('helvetica','bold');
      doc.setFontSize(10.5);
      doc.setTextColor(90, 20, 90);
      doc.text('Jogo #' + num + (j.selecionado ? '  \u2605' : ''), margin + 10, y);

      doc.setFont('courier','bold');
      doc.setFontSize(11.5);
      doc.setTextColor(30,20,30);
      doc.text(dezenas, margin + 10, y + 14);

      doc.setFont('helvetica','normal');
      doc.setFontSize(8);
      doc.setTextColor(140,130,140);
      doc.text(j.numeros.length + ' dezenas \u00b7 ' + (j.origem || ''), pageWidth - margin - 10, y - 2, { align: 'right' });

      y += 42;
    });

    drawFooter();
    doc.save('bolao-lotofacil-jogos.pdf');
  }).catch(function(e){
    console.error('Erro ao gerar PDF:', e);
    alert('N\u00e3o foi poss\u00edvel gerar o PDF agora. Verifique sua conex\u00e3o com a internet e tente novamente.');
  }).finally(function(){
    if(btn){ btn.disabled = false; btn.textContent = originalLabel || '\uD83D\uDCC4 Baixar todos em PDF'; }
  });
}

function fmtDateTime(iso){
  var d = new Date(iso);
  if(isNaN(d)) return '';
  return d.getDate().toString().padStart(2,'0') + '/' + (d.getMonth()+1).toString().padStart(2,'0') + '/' + d.getFullYear();
}

async function loadData(){
  try{
    var r = await window.storage.get('jogos', true);
    state.jogos = JSON.parse(r.value);
  }catch(e){
    state.jogos = [];
  }
  try{
    var rp = await window.storage.get('participants', true);
    state.participants = JSON.parse(rp.value);
  }catch(e){
    state.participants = [];
  }
  try{
    var pin = await window.storage.get('organizerPin', true);
    state.organizerPin = pin.value;
  }catch(e){
    state.organizerPin = null;
  }
  try{
    var res = await window.storage.get('resultado', true);
    state.resultado = JSON.parse(res.value);
  }catch(e){
    state.resultado = null;
  }
  try{
    var session = await window.storage.get('organizerSession', false);
    if(session.value === 'unlocked' && state.organizerPin){
      state.unlocked = true;
    }
  }catch(e){
    // sem sess\u00e3o salva, permanece bloqueado
  }
  try{
    var msg = await window.storage.get('organizerMsg', true);
    state.organizerMsg = JSON.parse(msg.value);
  }catch(e){
    state.organizerMsg = null;
  }
  try{
    var dismissed = await window.storage.get('organizerMsgDismissed', false);
    state.organizerMsgDismissed = dismissed.value;
  }catch(e){
    state.organizerMsgDismissed = null;
  }
  try{
    var cv = await window.storage.get('cotaValor', true);
    var cvNum = parseFloat(cv.value);
    state.cotaValor = isNaN(cvNum) ? null : cvNum;
  }catch(e){
    state.cotaValor = null;
  }
  try{
    var at = await window.storage.get('appTitle', true);
    var atParsed = JSON.parse(at.value);
    if(atParsed && (atParsed.eyebrow || atParsed.title)){
      state.appTitle.eyebrow = atParsed.eyebrow || state.appTitle.eyebrow;
      state.appTitle.title = atParsed.title || state.appTitle.title;
    }
  }catch(e){
    // mant\u00e9m os valores padr\u00e3o (\"Bol\u00e3o de grupo\" / \"Lotof\u00e1cil 2026\")
  }
  applyAppTitle();
  try{
    var extra = await window.storage.get('officialDrawsExtra', true);
    state.officialDrawsExtra = JSON.parse(extra.value);
  }catch(e){
    state.officialDrawsExtra = [];
  }
  mergeOfficialDraws(state.officialDrawsExtra);
  render();
  autoCheckLatestConcurso();
}

// Concursos buscados automaticamente (al\u00e9m da base fixa embutida no c\u00f3digo) ficam
// guardados aqui e no storage compartilhado, para n\u00e3o se perderem e para todo mundo
// que abrir o bol\u00e3o ver o mesmo resultado mais recente.
function mergeOfficialDraws(draws){
  var changed = false;
  (draws || []).forEach(function(d){
    if(d && d.concurso && !officialDraws.some(function(x){ return x.concurso === d.concurso; })){
      officialDraws.push(d);
      changed = true;
    }
  });
  if(changed){
    officialDraws.sort(function(a,b){ return a.concurso - b.concurso; });
  }
  return changed;
}

function addOfficialDraw(draw){
  if(!draw || !draw.concurso || !draw.data || !Array.isArray(draw.dezenas) || draw.dezenas.length !== 15) return false;
  if(officialDraws.some(function(x){ return x.concurso === draw.concurso; })) return false;
  officialDraws.push(draw);
  officialDraws.sort(function(a,b){ return a.concurso - b.concurso; });
  state.officialDrawsExtra.push(draw);
  window.storage.set('officialDrawsExtra', JSON.stringify(state.officialDrawsExtra), true).catch(function(e){ console.error('Erro ao salvar concursos extras:', e); });
  return true;
}

// Converte data no formato "DD/MM/AAAA" (padr\u00e3o da Caixa) para "AAAA-MM-DD".
function brDateToIso(br){
  if(!br || typeof br !== 'string') return null;
  var parts = br.split('/');
  if(parts.length !== 3) return null;
  return parts[2] + '-' + parts[1] + '-' + parts[0];
}

// Interpreta a resposta da API oficial da Caixa (servicebus2.caixa.gov.br).
function parseCaixaOficial(data){
  if(!data || !data.numero || !data.dataApuracao || !Array.isArray(data.listaDezenas)) return null;
  var dezenas = data.listaDezenas.map(function(n){ return parseInt(n,10); }).filter(function(n){ return !isNaN(n); }).sort(function(a,b){ return a-b; });
  if(dezenas.length !== 15) return null;
  var iso = brDateToIso(data.dataApuracao);
  if(!iso) return null;
  return { concurso: parseInt(data.numero,10), data: iso, dezenas: dezenas };
}

// Interpreta a resposta do espelho p\u00fablico loteriascaixa-api (usado como reserva
// caso a API oficial da Caixa esteja fora do ar ou bloqueie a origem por CORS).
function parseLoteriasCaixaApi(data){
  if(!data || !data.concurso || !data.data || !Array.isArray(data.dezenas)) return null;
  var dezenas = data.dezenas.map(function(n){ return parseInt(n,10); }).filter(function(n){ return !isNaN(n); }).sort(function(a,b){ return a-b; });
  if(dezenas.length !== 15) return null;
  var iso = brDateToIso(data.data);
  if(!iso) return null;
  return { concurso: parseInt(data.concurso,10), data: iso, dezenas: dezenas };
}

// Retorna {concurso, data, dezenas} ou null se nenhuma fonte responder.
async function fetchLatestConcursoOficial(){
  var fontes = [
    { url: 'https://servicebus2.caixa.gov.br/portaldeloterias/api/lotofacil', parse: parseCaixaOficial },
    { url: 'https://loteriascaixa-api.herokuapp.com/api/lotofacil/latest', parse: parseLoteriasCaixaApi }
  ];
  for(var i=0;i<fontes.length;i++){
    try{
      var resp = await fetch(fontes[i].url, { headers: { 'Accept': 'application/json' } });
      if(!resp.ok) continue;
      var data = await resp.json();
      var parsed = fontes[i].parse(data);
      if(parsed && parsed.concurso && parsed.data && parsed.dezenas.length === 15) return parsed;
    }catch(e){
      console.error('Falha ao consultar ' + fontes[i].url + ':', e);
    }
  }
  return null;
}

// Roda no m\u00e1ximo uma vez por dia (controlado via storage compartilhado, ent\u00e3o
// vale para todo mundo que usa o bol\u00e3o) para n\u00e3o ficar chamando a API \u00e0 toa.
async function autoCheckLatestConcurso(){
  try{
    var last = await window.storage.get('officialLastAutoCheck', true);
    var today = new Date().toISOString().slice(0,10);
    if(last && last.value === today) return;
  }catch(e){ /* nunca checado ainda, prossegue */ }
  var draw = await fetchLatestConcursoOficial();
  if(draw && addOfficialDraw(draw)){
    render();
  }
  window.storage.set('officialLastAutoCheck', new Date().toISOString().slice(0,10), true).catch(function(){});
}

function contarAcertos(numerosJogo){
  if(!state.resultado || !state.resultado.numeros) return null;
  var res = state.resultado.numeros;
  return numerosJogo.filter(function(n){ return res.indexOf(n) > -1; }).length;
}
function jogoKey(numeros){
  return numeros.slice().sort(function(a,b){ return a-b; }).join(',');
}
function existingJogoKeys(){
  var s = new Set();
  state.jogos.forEach(function(j){ s.add(jogoKey(j.numeros)); });
  return s;
}
function diffByOne(a, b){
  if(a.length !== b.length) return false;
  var setB = new Set(b);
  var diff = 0;
  for(var i=0;i<a.length;i++){ if(!setB.has(a[i])) diff++; if(diff>1) return false; }
  return diff === 1;
}
function findNearDuplicate(numeros, excludeId){
  for(var i=0;i<state.jogos.length;i++){
    var j = state.jogos[i];
    if(excludeId && j.id === excludeId) continue;
    if(diffByOne(numeros, j.numeros)) return j;
  }
  return null;
}
function findExactDuplicate(numeros, excludeId){
  var key = jogoKey(numeros);
  for(var i=0;i<state.jogos.length;i++){
    var j = state.jogos[i];
    if(excludeId && j.id === excludeId) continue;
    if(jogoKey(j.numeros) === key) return j;
  }
  return null;
}
function buildPreview(gamesArrays){
  var existingKeys = existingJogoKeys();
  var seenInBatch = {};
  return gamesArrays.map(function(nums){
    var key = jogoKey(nums);
    var dupExisting = existingKeys.has(key);
    var dupBatch = !!seenInBatch[key];
    var isDup = dupExisting || dupBatch;
    if(!isDup) seenInBatch[key] = true;
    var nearMatch = !isDup ? findNearDuplicate(nums) : null;
    return { numeros: nums, checked: !isDup, duplicado: isDup, quaseDuplicado: !!nearMatch, nearRef: nearMatch };
  });
}

function parsePainelText(text){
  var lines = text.split('\n').map(function(l){ return l.trim(); }).filter(function(l){ return l.length; });
  var parsed = [];
  var errors = [];
  lines.forEach(function(line, i){
    var cleaned = line.replace(/^\s*\d+\s*[:\)\.\-]\s*/, '');
    var parts = cleaned.split(/[\s,;]+/).filter(function(p){ return p.length; });
    var nums = parts.map(function(p){ return parseInt(p, 10); });
    if(!nums.length || nums.some(function(n){ return isNaN(n); })){
      errors.push('Linha ' + (i+1) + ': cont\u00e9m valor n\u00e3o num\u00e9rico, foi ignorada.'); return;
    }
    var uniq = Array.from(new Set(nums));
    if(uniq.length !== nums.length){
      errors.push('Linha ' + (i+1) + ': n\u00fameros repetidos, foi ignorada.'); return;
    }
    if(uniq.some(function(n){ return n < 1 || n > 25; })){
      errors.push('Linha ' + (i+1) + ': h\u00e1 n\u00famero fora do intervalo 1-25, foi ignorada.'); return;
    }
    if(uniq.length < 15 || uniq.length > 20){
      errors.push('Linha ' + (i+1) + ': tem ' + uniq.length + ' n\u00fameros (precisa de 15 a 20), foi ignorada.'); return;
    }
    uniq.sort(function(a,b){ return a-b; });
    parsed.push(uniq);
  });
  return { parsed: parsed, errors: errors };
}

function parseInput(text){
  var lines = text.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  var parsed = [];
  var errors = [];
  lines.forEach(function(line, i){
    var nums = line.split(/[\s,;]+/).filter(Boolean).map(Number);
    if(nums.some(isNaN)){ errors.push('Linha '+(i+1)+': cont\u00e9m valor n\u00e3o num\u00e9rico.'); return; }
    var uniq = Array.from(new Set(nums));
    if(uniq.length !== 15){ errors.push('Linha '+(i+1)+': tem '+uniq.length+' n\u00fameros \u00fanicos (precisa de 15).'); return; }
    if(uniq.some(function(n){return n<1||n>25;})){ errors.push('Linha '+(i+1)+': h\u00e1 n\u00famero fora do intervalo 1-25.'); return; }
    parsed.push(uniq.sort(function(a,b){return a-b;}));
  });
  return {parsed: parsed, errors: errors};
}

function maxConsecRun(sortedArr){
  var best = 1, cur = 1;
  for(var i=1;i<sortedArr.length;i++){
    if(sortedArr[i] === sortedArr[i-1]+1){ cur++; if(cur>best) best=cur; }
    else { cur = 1; }
  }
  return best;
}
function countIn(draw, list){
  var set = list instanceof Set ? list : new Set(list);
  return draw.filter(function(n){ return set.has(n); }).length;
}
function distOf(arr){
  var d = {};
  arr.forEach(function(v){ d[v] = (d[v]||0) + 1; });
  return d;
}
function modeOf(dist){
  var bestK = null, bestC = -1;
  Object.keys(dist).forEach(function(k){ if(dist[k]>bestC){ bestC=dist[k]; bestK=k; } });
  return bestK===null ? null : Number(bestK);
}

function computeStats(subset){
  var f = {}, a = {};
  for(var n=1;n<=25;n++){ f[n]=0; a[n]=null; }
  subset.forEach(function(draw, idx){
    draw.forEach(function(n){
      f[n]++;
      a[n] = subset.length - 1 - idx;
    });
  });
  for(var n2=1;n2<=25;n2++){ if(a[n2]===null) a[n2]=subset.length; }
  var sums = subset.map(function(d){return d.reduce(function(s,n){return s+n;},0);});
  var odds = subset.map(function(d){return d.filter(function(n){return n%2===1;}).length;});
  function avg(arr){return arr.reduce(function(s,x){return s+x;},0)/(arr.length||1);}

  // Padr\u00f5es adicionais: sequ\u00eancias, linhas/colunas da grade, moldura/miolo, primos, m\u00faltiplos de 3
  var seqs = subset.map(function(d){ return maxConsecRun(d.slice().sort(function(a2,b2){return a2-b2;})); });
  var rowCounts = subset.map(function(d){ return GRID_ROWS.map(function(row){ return countIn(d,row); }); });
  var colCounts = subset.map(function(d){ return GRID_COLS.map(function(col){ return countIn(d,col); }); });
  var rowAvg = [0,1,2,3,4].map(function(ri){ return avg(rowCounts.map(function(rc){ return rc[ri]; })); });
  var colAvg = [0,1,2,3,4].map(function(ci){ return avg(colCounts.map(function(cc){ return cc[ci]; })); });
  var mioloCounts = subset.map(function(d){ return countIn(d, MIOLO_NUMS); });
  var primeCounts = subset.map(function(d){ return countIn(d, PRIMOS_NUMS); });
  var mult3Counts = subset.map(function(d){ return countIn(d, MULT3_NUMS); });
  var repeatCounts = [];
  for(var i=1;i<subset.length;i++){
    var prevSet = new Set(subset[i-1]);
    repeatCounts.push(subset[i].filter(function(x){ return prevSet.has(x); }).length);
  }

  return {
    freq:f, atraso:a,
    sumAvg: avg(sums), sumMin: Math.min.apply(null,sums), sumMax: Math.max.apply(null,sums),
    oddAvg: avg(odds), oddMin: Math.min.apply(null,odds), oddMax: Math.max.apply(null,odds),
    oddDist: distOf(odds),
    seqAvg: avg(seqs), seqMin: Math.min.apply(null,seqs), seqMax: Math.max.apply(null,seqs),
    seqMode: modeOf(distOf(seqs)), seqDist: distOf(seqs),
    rowAvg: rowAvg, colAvg: colAvg,
    mioloAvg: avg(mioloCounts), mioloMin: Math.min.apply(null,mioloCounts), mioloMax: Math.max.apply(null,mioloCounts),
    primeAvg: avg(primeCounts), primeMin: Math.min.apply(null,primeCounts), primeMax: Math.max.apply(null,primeCounts),
    mult3Avg: avg(mult3Counts), mult3Min: Math.min.apply(null,mult3Counts), mult3Max: Math.max.apply(null,mult3Counts),
    repeatPrevAvg: repeatCounts.length ? avg(repeatCounts) : null,
    repeatPrevMin: repeatCounts.length ? Math.min.apply(null,repeatCounts) : null,
    repeatPrevMax: repeatCounts.length ? Math.max.apply(null,repeatCounts) : null,
    n: subset.length
  };
}

function mixColor(c1, c2, t){
  function hex2rgb(h){ h=h.replace('#',''); return [parseInt(h.substr(0,2),16),parseInt(h.substr(2,2),16),parseInt(h.substr(4,2),16)]; }
  var a=hex2rgb(c1), b=hex2rgb(c2);
  var r = Math.round(a[0]+(b[0]-a[0])*t);
  var g = Math.round(a[1]+(b[1]-a[1])*t);
  var bl = Math.round(a[2]+(b[2]-a[2])*t);
  return 'rgb('+r+','+g+','+bl+')';
}

function renderPnBallGrid(container, freqObj, opts){
  opts = opts || {};
  container.innerHTML = '';
  var vals = Object.values(freqObj);
  var maxF = vals.length ? Math.max.apply(null, vals) : 0;
  var minF = vals.length ? Math.min.apply(null, vals) : 0;
  for(var n=1;n<=25;n++){
    var b = document.createElement('div');
    b.className = 'pn-ball' + (opts.selectable ? ' selectable' : '');
    var count = freqObj[n] || 0;
    if(opts.heat){
      var t = maxF>minF ? (count-minF)/(maxF-minF) : 0;
      var bg = mixColor('#FBF9F6', '#C6931B', t);
      b.style.background = bg;
      b.style.color = t>0.55 ? '#fff' : '';
      b.style.borderColor = t>0.55 ? '#8F6B12' : '';
    }
    if(opts.poolSet && opts.poolSet.has(n)){ b.classList.add('in-pool'); }
    var label = String(n).padStart(2,'0');
    b.innerHTML = label + (opts.showSub ? '<small>'+opts.showSub(n)+'</small>' : '');
    if(opts.selectable){
      b.addEventListener('click', function(num){
        return function(){
          if(state.gerador.pool.has(num)) state.gerador.pool.delete(num); else state.gerador.pool.add(num);
          renderPoolGridUI();
        };
      }(n));
    }
    container.appendChild(b);
  }
}

function renderPoolGridUI(){
  var container = document.getElementById('gnPoolGrid');
  if(!container) return;
  var freqObj = state.gerador.stats ? state.gerador.stats.freq : {};

function combinations(arr, k){
  var result = [];
  function helper(start, combo){
    if(combo.length === k){ result.push(combo.slice()); return; }
    for(var i=start;i<arr.length;i++){
      combo.push(arr[i]);
      helper(i+1, combo);
      combo.pop();
    }
  }
  helper(0, []);
  return result;
}

function nCk(n,k){
  if(k<0||k>n) return 0;
  k = Math.min(k, n-k);
  var r = 1;
  for(var i=0;i<k;i++){ r = r*(n-i)/(i+1); }
  return Math.round(r);
}

// Verifica se uma aposta (array de 15+ dezenas) respeita os padr\u00f5es marcados
// como "Aplicar" no painel 3, usando as m\u00e9dias da janela anaisada \u00b1 toler\u00e2ncia.
function checkPatterns(bet, stats, pf, tol){
  if(pf.seq){
    var run = maxConsecRun(bet.slice().sort(function(a,b){return a-b;}));
    if(run < stats.seqMin || run > stats.seqMax) return false;
  }
  if(pf.miolo){
    var mc = countIn(bet, MIOLO_NUMS);
    var loM = Math.max(0, Math.round(stats.mioloAvg - tol.miolo));
    var hiM = Math.min(9, Math.round(stats.mioloAvg + tol.miolo));
    if(mc < loM || mc > hiM) return false;
  }
  if(pf.primos){
    var pc = countIn(bet, PRIMOS_NUMS);
    var loP = Math.max(0, Math.round(stats.primeAvg - tol.primos));
    var hiP = Math.min(9, Math.round(stats.primeAvg + tol.primos));
    if(pc < loP || pc > hiP) return false;
  }
  if(pf.mult3){
    var m3 = countIn(bet, MULT3_NUMS);
    var loT = Math.max(0, Math.round(stats.mult3Avg - tol.mult3));
    var hiT = Math.min(8, Math.round(stats.mult3Avg + tol.mult3));
    if(m3 < loT || m3 > hiT) return false;
  }
  if(pf.rowcol){
    for(var ri=0; ri<5; ri++){
      var rc = countIn(bet, GRID_ROWS[ri]);
      var loR = Math.max(0, Math.round(stats.rowAvg[ri] - tol.rowcol));
      var hiR = Math.min(5, Math.round(stats.rowAvg[ri] + tol.rowcol));
      if(rc < loR || rc > hiR) return false;
    }
    for(var ci=0; ci<5; ci++){
      var cc = countIn(bet, GRID_COLS[ci]);
      var loC = Math.max(0, Math.round(stats.colAvg[ci] - tol.rowcol));
      var hiC = Math.min(5, Math.round(stats.colAvg[ci] + tol.rowcol));
      if(cc < loC || cc > hiC) return false;
    }
  }
  return true;
}

// Faixas "dentro do padr\u00e3o" usadas para avaliar os palpites dos participantes.
// Quando h\u00e1 hist\u00f3rico de sorteios carregado na aba Gerador de jogos (state.gerador.stats),
// usa a m\u00e9dia real observada \u00b1 toler\u00e2ncia; sen\u00e3o, cai numa faixa gen\u00e9rica
// (mesmos valores j\u00e1 usados como padr\u00e3o no gerador quando n\u00e3o h\u00e1 hist\u00f3rico).
function defaultPatternRanges(){
  var s = state.gerador.stats;
  if(s){
    return {
      oddRange: [Math.max(0,Math.round(s.oddAvg-2)), Math.min(15,Math.round(s.oddAvg+2))],
      seqRange: [s.seqMin, s.seqMax],
      mioloRange: [Math.max(0,Math.round(s.mioloAvg-2)), Math.min(9,Math.round(s.mioloAvg+2))],
      primosRange: [Math.max(0,Math.round(s.primeAvg-2)), Math.min(9,Math.round(s.primeAvg+2))],
      mult3Range: [Math.max(0,Math.round(s.mult3Avg-2)), Math.min(8,Math.round(s.mult3Avg+2))],
      fonte: 'com base no hist\u00f3rico de ' + s.n + ' concurso(s) carregado na aba Gerador de jogos'
    };
  }
  return {
    oddRange: [6,9],
    seqRange: [2,6],
    mioloRange: [3,8],
    primosRange: [3,8],
    mult3Range: [3,7],
    fonte: 'faixa padr\u00e3o gen\u00e9rica (carregue o hist\u00f3rico de sorteios na aba Gerador de jogos para checar contra a m\u00e9dia real)'
  };
}

// Avalia um palpite contra as regras de padr\u00e3o (pares/\u00edmpares, sequ\u00eancias,
// moldura x miolo, primos, m\u00faltiplos de 3). S\u00f3 fica "apto" se respeitar todas.
function checkParticipantPatterns(numeros){
  var r = defaultPatternRanges();
  var falhas = [];
  var sorted = numeros.slice().sort(function(a,b){ return a-b; });

  var oddCount = numeros.filter(function(n){ return n%2===1; }).length;
  if(oddCount < r.oddRange[0] || oddCount > r.oddRange[1]){
    falhas.push('Pares e \u00edmpares: ' + oddCount + ' dezena(s) \u00edmpar(es) \u2014 esperado entre ' + r.oddRange[0] + ' e ' + r.oddRange[1] + '.');
  }
  var run = maxConsecRun(sorted);
  if(run < r.seqRange[0] || run > r.seqRange[1]){
    falhas.push('Sequ\u00eancias: maior sequ\u00eancia de ' + run + ' n\u00famero(s) seguido(s) \u2014 esperado entre ' + r.seqRange[0] + ' e ' + r.seqRange[1] + '.');
  }
  var mc = countIn(numeros, MIOLO_NUMS);
  if(mc < r.mioloRange[0] || mc > r.mioloRange[1]){
    falhas.push('Moldura x miolo: ' + mc + ' dezena(s) no miolo \u2014 esperado entre ' + r.mioloRange[0] + ' e ' + r.mioloRange[1] + '.');
  }
  var pc = countIn(numeros, PRIMOS_NUMS);
  if(pc < r.primosRange[0] || pc > r.primosRange[1]){
    falhas.push('N\u00fameros primos: ' + pc + ' primo(s) \u2014 esperado entre ' + r.primosRange[0] + ' e ' + r.primosRange[1] + '.');
  }
  var m3 = countIn(numeros, MULT3_NUMS);
  if(m3 < r.mult3Range[0] || m3 > r.mult3Range[1]){
    falhas.push('M\u00faltiplos de 3: ' + m3 + ' m\u00faltiplo(s) de 3 \u2014 esperado entre ' + r.mult3Range[0] + ' e ' + r.mult3Range[1] + '.');
  }

  return { apto: falhas.length === 0, falhas: falhas, fonte: r.fonte };
}

function generateHeuristic(poolArr, numGames, filterOn, sumRange, oddRange, patternCheckFn){
  var counts = {}; poolArr.forEach(function(n){counts[n]=0;});
  var existing = {};
  var bets = [];
  var attempts = 0, maxAttempts = numGames*300;
  while(bets.length<numGames && attempts<maxAttempts){
    attempts++;
    var sorted = poolArr.slice().sort(function(a,b){ return (counts[a]-counts[b]) || (Math.random()-0.5); });
    var candidate = sorted.slice(0,15);
    if(sorted.length>15 && Math.random()<0.5){
      var outIdx = 15 + Math.floor(Math.random()*(sorted.length-15));
      var inIdx = Math.floor(Math.random()*15);
      candidate[inIdx] = sorted[outIdx];
    }
    candidate = Array.from(new Set(candidate));
    if(candidate.length<15) continue;
    candidate.sort(function(a,b){return a-b;});
    var key = candidate.join(',');
    if(existing[key]) continue;
    var sum = candidate.reduce(function(s,n){return s+n;},0);
    var oddCount = candidate.filter(function(n){return n%2===1;}).length;
    if(filterOn){
      if(sum<sumRange[0]||sum>sumRange[1]) continue;
      if(oddCount<oddRange[0]||oddCount>oddRange[1]) continue;
    }
    if(patternCheckFn && !patternCheckFn(candidate)) continue;
    existing[key]=true;
    bets.push(candidate);
    candidate.forEach(function(n){counts[n]++;});
  }
  return bets;
}

// Monta o texto do hist\u00f3rico a partir dos dados oficiais cadastrados no
// intervalo informado, sempre com o sorteio mais recente na primeira linha.
function buildOfficialText(start, end){
  var subset = officialDraws.filter(function(d){ return d.data >= start && d.data <= end; });
  subset.sort(function(a,b){ return a.data < b.data ? -1 : 1; });
  var ordered = subset.slice().reverse();
  var lines = ordered.map(function(d){ return d.dezenas.map(function(n){ return String(n).padStart(2,'0'); }).join(', '); });
  return { text: lines.join('\n'), subset: subset };
}

function doAnalyze(textOverride){
  var g = state.gerador;
  var text = (typeof textOverride === 'string') ? textOverride : document.getElementById('gnDrawInput').value;
  g.drawInputText = text;
  var result = parseInput(text);
  g.parseErrMsg = result.errors.length ? result.errors.join('\n') : '';
  if(!result.parsed.length){
    g.parseErrMsg += (g.parseErrMsg?'\n':'') + 'Nenhum sorteio v\u00e1lido encontrado.';
    g.stats = null;
    renderGerador();
    return;
  }
  // O texto sempre tem o sorteio mais recente na primeira linha, ent\u00e3o
  // invertemos para obter a ordem cronol\u00f3gica (mais antigo primeiro).
  var chronological = result.parsed.slice().reverse();
  var win = parseInt(g.windowSize, 10);
  var windowDraws = chronological.slice(Math.max(0, chronological.length - win));
  g.stats = computeStats(windowDraws);
  g.pool = new Set();
  renderGerador();
}

    if(repeatMinInput) repeatMinInput.addEventListener('change', function(){ g.repeatMin = parseInt(this.value,10); if(isNaN(g.repeatMin)) g.repeatMin = 0; });
    var repeatMaxInput = document.getElementById('gnRepeatMax');
    if(repeatMaxInput) repeatMaxInput.addEventListener('change', function(){ g.repeatMax = parseInt(this.value,10); if(isNaN(g.repeatMax)) g.repeatMax = 15; });

    document.getElementById('gnGenerateBtn').addEventListener('click', function(){
      g.wheelErrMsg = '';
      var poolArr = Array.from(g.pool).sort(function(a,b){return a-b;});
      if(poolArr.length<15 || poolArr.length>20){
        g.wheelErrMsg = 'Selecione entre 15 e 20 n\u00fameros no grupo.';
        renderGerador();
        return;
      }
      var mode = document.querySelector('input[name=gnMode]:checked').value;
      g.mode = mode;
      var tol = g.patternTol;
      var pf = g.patternFilters;
      var anyPatternActive = Object.keys(pf).some(function(k){return pf[k];});
      if(mode === 'full'){
        var total = nCk(poolArr.length, 15);
        if(total > 4000){
          g.wheelErrMsg = 'Fechamento completo com '+poolArr.length+' n\u00fameros geraria '+total+' jogos \u2014 reduza o grupo (at\u00e9 18 n\u00fameros fica em faixa administr\u00e1vel) ou use a redu\u00e7\u00e3o heur\u00edstica.';
          renderGerador();
          return;
        }
        var combos = combinations(poolArr, 15);
        g.lastBetsNote = 'Fechamento completo: '+combos.length+' jogos cobrem todas as combina\u00e7\u00f5es de 15 dentro do grupo de '+poolArr.length+'. Se o resultado oficial tiver os 15 pontos dentro do seu grupo, uma dessas apostas acerta 15.';
        g.lastBetsMode = 'fechamento completo';
        g.lastBets = combos;
        g.betsChecked = combos.map(function(){ return true; });
      } else {
        var numGames = parseInt(document.getElementById('gnNumGames').value,10) || 10;
        var filterOn = document.getElementById('gnFilterTypical').checked;
        g.numGames = numGames; g.filterTypical = filterOn;
        var sumRange, oddRange;
        if(g.stats){
          sumRange = [Math.round(g.stats.sumAvg-15), Math.round(g.stats.sumAvg+15)];
          oddRange = [Math.max(0,Math.round(g.stats.oddAvg-2)), Math.min(15,Math.round(g.stats.oddAvg+2))];
        } else {
          sumRange = [180,210]; oddRange = [6,9];
        }
        var patternCheckFn = (anyPatternActive && g.stats) ? function(bet){ return checkPatterns(bet, g.stats, pf, tol); } : null;
        var bets = generateHeuristic(poolArr, numGames, filterOn, sumRange, oddRange, patternCheckFn);
        g.lastBetsNote = 'Redu\u00e7\u00e3o heur\u00edstica: '+bets.length+' jogo(s) gerados distribuindo os n\u00fameros do grupo de forma equilibrada. Isto n\u00e3o garante cobertura formal \u2014 apenas organiza a aposta dentro do seu or\u00e7amento.';
        if(patternCheckFn && bets.length < numGames){
          g.lastBetsNote += ' Apenas '+bets.length+' de '+numGames+' pedido(s) atenderam a todos os padr\u00f5es marcados \u2014 desmarque algum padr\u00e3o ou pe\u00e7a menos jogos se precisar do total completo.';
        }
        g.lastBetsMode = 'redu\u00e7\u00e3o heur\u00edstica';
        var finalBets2 = applyRepeatFilter(bets);
        g.lastBets = finalBets2;
        g.betsChecked = finalBets2.map(function(){ return true; });
      }
      renderGerador();

      // Aplica o filtro "reps. do \u00faltimo concurso" sobre uma lista de jogos j\u00e1
      // gerados (dispon\u00edvel apenas no modo de redu\u00e7\u00e3o heur\u00edstica) e ajusta a
      // nota exibida pra deixar claro quantos foram exclu\u00eddos.
      function applyRepeatFilter(list){
        if(!g.filterRepeat || !lastOfficialDraw) return list;
        var minR = parseInt(document.getElementById('gnRepeatMin').value,10);
        var maxR = parseInt(document.getElementById('gnRepeatMax').value,10);
        g.repeatMin = isNaN(minR) ? 0 : minR;
        g.repeatMax = isNaN(maxR) ? 15 : maxR;
        var lastSet = new Set(lastOfficialDraw.dezenas);
        var filtered = list.filter(function(bet){
          var rep = bet.filter(function(n){ return lastSet.has(n); }).length;
          return rep >= g.repeatMin && rep <= g.repeatMax;
        });
        var removed = list.length - filtered.length;
        var extra = ' Filtro de repeti\u00e7\u00e3o do concurso ' + lastOfficialDraw.concurso + ' ativo (' + g.repeatMin + '\u2013' + g.repeatMax + ' dezenas em comum): ' + filtered.length + ' de ' + list.length + ' jogos mantidos' + (removed ? ', ' + removed + ' escondido(s) por ficarem fora da faixa' : '') + '.';
        g.lastBetsNote += extra;
        return filtered;
      }
    });

    if(g.lastBets.length){
      if(g.betsChecked.length !== g.lastBets.length){
        g.betsChecked = g.lastBets.map(function(){ return true; });
      }
      var out = document.getElementById('gnBetsOutput');
      var allChecked = g.betsChecked.every(function(c){ return c; });
      var betsHtml = '<div class="bl-row" style="justify-content:space-between;margin-bottom:6px;">';
      betsHtml += '<label class="bl-check-toggle"><input type="checkbox" id="gnBetsSelectAll" ' + (allChecked?'checked':'') + ' /> Marcar todos (' + g.lastBets.length + ' jogos)</label>';
      betsHtml += '</div>';
      betsHtml += g.lastBets.map(function(bet, i){
        var sum = bet.reduce(function(s,n){return s+n;},0);
        var oddCount = bet.filter(function(n){return n%2===1;}).length;
        var ballsHtml = bet.map(function(n){return '<span class="bl-mini-ball">'+String(n).padStart(2,'0')+'</span>';}).join('');
        var repHtml = '';
        if(lastOfficialDraw){
          var lastSetDisp = new Set(lastOfficialDraw.dezenas);
          var repCount = bet.filter(function(n){ return lastSetDisp.has(n); }).length;
          repHtml = ' \u00b7 ' + repCount + ' rep. do \u00faltimo concurso';
        }
        return '<div class="bl-row" style="border-bottom:1px solid var(--line);padding:6px 0;">'
          + '<label class="bl-check-toggle"><input type="checkbox" class="gnBetCheck" data-idx="'+i+'" '+(g.betsChecked[i]?'checked':'')+' /></label>'
          + '<span class="bl-num" style="color:var(--muted);width:26px;">'+(i+1)+'</span><span class="bl-mini-balls">'+ballsHtml+'</span><span class="bl-hint" style="margin-left:auto;">soma '+sum+' \u00b7 '+oddCount+' \u00edmpares'+repHtml+'</span></div>';
      }).join('');
      out.innerHTML = betsHtml;

      function updateSendBtn(){
        var checkedCount = g.betsChecked.filter(function(c){return c;}).length;
        var sendBtn = document.getElementById('gnSendToJogosBtn');
        if(sendBtn){
          sendBtn.textContent = 'Enviar ' + checkedCount + ' jogo' + (checkedCount===1?'':'s') + ' selecionado' + (checkedCount===1?'':'s') + ' para Nossos Jogos';
          sendBtn.disabled = checkedCount === 0;
        }
      }
      updateSendBtn();

      document.getElementById('gnBetsSelectAll').addEventListener('change', function(){
        var v = this.checked;
        g.betsChecked = g.betsChecked.map(function(){ return v; });
        document.querySelectorAll('.gnBetCheck').forEach(function(cb){ cb.checked = v; });
        updateSendBtn();
      });
      document.querySelectorAll('.gnBetCheck').forEach(function(cb){
        cb.addEventListener('change', function(){
          g.betsChecked[parseInt(this.dataset.idx)] = this.checked;
          var allNow = g.betsChecked.every(function(c){return c;});
          document.getElementById('gnBetsSelectAll').checked = allNow;
          updateSendBtn();
        });
      });

      var downloadBtn = document.getElementById('gnDownloadBtn');
      if(downloadBtn){
        downloadBtn.addEventListener('click', function(){
          var bets = g.lastBets;
          var text = bets.map(function(b,i){ return (i+1)+': '+b.map(function(n){return String(n).padStart(2,'0');}).join(' '); }).join('\n');
          var blob = new Blob([text], {type:'text/plain'});
          var url = URL.createObjectURL(blob);
          var a = document.createElement('a');
          a.href = url; a.download = 'jogos_lotofacil.txt';
          document.body.appendChild(a); a.click(); document.body.removeChild(a);
          URL.revokeObjectURL(url);
        });
      }

      var sendBtn = document.getElementById('gnSendToJogosBtn');
      if(sendBtn){
        sendBtn.addEventListener('click', function(){
          var chosen = g.lastBets.filter(function(bet, i){ return g.betsChecked[i]; });
          if(!chosen.length) return;
          previewOrigem = 'Painel Lotof\u00e1cil (' + g.lastBetsMode + ')';
          previewGames = buildPreview(chosen);
          switchToTab('jogos');
        });
      }
    }
  }
}

    html += '<div id="blPreviewWrap"></div>';

  html += '<select class="bl-input" id="blFilterSel">';
  html += '<option value="todos"' + (state.jogosFilter==='todos'?' selected':'') + '>Todos os jogos</option>';
  html += '<option value="selecionados"' + (state.jogosFilter==='selecionados'?' selected':'') + '>S\u00f3 selecionados</option>';
  html += '<option value="nao"' + (state.jogosFilter==='nao'?' selected':'') + '>S\u00f3 n\u00e3o selecionados</option>';
  html += '</select>';
  if(state.resultado && state.resultado.numeros){
    html += '<select class="bl-input" id="blOrdemSel">';
    html += '<option value="recentes"' + (state.jogosOrdem==='recentes'?' selected':'') + '>Mais recentes primeiro</option>';
    html += '<option value="acertos"' + (state.jogosOrdem==='acertos'?' selected':'') + '>Mais acertos primeiro</option>';
    html += '</select>';
  }
  html += '</div>';

  html += '<div class="bl-row" style="justify-content:space-between;align-items:center;margin-bottom:12px;flex-wrap:wrap;">';
  html += '<button class="bl-btn secondary" id="blToggleViewBtn" type="button">' + (state.jogosViewMode === 'lista' ? '\u25A6 Ver em cart\u00f5es' : '\u2261 Ver todos em lista \u00fanica') + '</button>';

  html += '<button class="bl-btn secondary" id="blPdfBtn" type="button" ' + (state.jogos.length ? '' : 'disabled') + '>\uD83D\uDCC4 Baixar todos em PDF</button>';

      document.getElementById('blCancelDeleteAllBtn').addEventListener('click', function(){
        wrap.innerHTML = '';
      });
      document.getElementById('blConfirmDeleteAllBtn').addEventListener('click', function(){
        state.jogos = [];
        state.jogosMsg = 'Todos os jogos foram exclu\u00eddos.';
        updateHeader();
        renderJogos();
        saveJogos().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
      });
    });
  }

  var fileInput = document.getElementById('blFileInput');
  if(fileInput){
    fileInput.addEventListener('change', function(e){
      var file = e.target.files[0];
      if(!file) return;
      document.getElementById('blFileName').textContent = file.name;
      var reader = new FileReader();
      reader.onload = function(ev){
        document.getElementById('blPasteArea').value = ev.target.result;
      };
      reader.readAsText(file);
    });
  }

  var analyzeBtn = document.getElementById('blAnalyzeBtn');
  if(analyzeBtn){
    analyzeBtn.addEventListener('click', function(){
      var err = document.getElementById('blPasteErr');
      var raw = document.getElementById('blPasteArea').value;
      var result = parsePainelText(raw);
      if(!result.parsed.length){
        err.textContent = (result.errors.length ? result.errors.join('\n') + '\n' : '') + 'Nenhum jogo v\u00e1lido encontrado.';
        document.getElementById('blPreviewWrap').innerHTML = '';
        return;
      }
      err.textContent = result.errors.length ? result.errors.join('\n') : '';
      previewOrigem = 'Painel Lotof\u00e1cil (colado)';
      previewGames = buildPreview(result.parsed);
      renderPreview();
    });
  }

  var manualBtn = document.getElementById('blManualBtn');
  if(manualBtn){
    manualBtn.addEventListener('click', function(){
      toggleManualForm();
    });
  }

  var editResultBtn = document.getElementById('blEditResultBtn');
  if(editResultBtn){
    editResultBtn.addEventListener('click', function(){
      toggleResultForm();
    });
  }
  var clearResultBtn = document.getElementById('blClearResultBtn');
  if(clearResultBtn){
    clearResultBtn.addEventListener('click', function(){
      state.resultado = null;
      updateHeader();
      renderJogos();
      saveResultado().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
    });
  }

  if(state.unlocked && previewGames.length){
    renderPreview();
  }
}

var pendingResultNums = [];

function toggleResultForm(){
  var wrap = document.getElementById('blResultForm');
  if(wrap.innerHTML){ wrap.innerHTML = ''; return; }
  pendingResultNums = state.resultado && state.resultado.numeros ? state.resultado.numeros.slice() : [];

function renderPreview(){
  var wrap = document.getElementById('blPreviewWrap');
  if(!previewGames.length){ wrap.innerHTML = ''; return; }
  var selectable = previewGames.filter(function(g){ return !g.duplicado; });
  var allChecked = selectable.length > 0 && selectable.every(function(g){ return g.checked; });
  var dupCount = previewGames.filter(function(g){ return g.duplicado; }).length;
  var nearCount = previewGames.filter(function(g){ return g.quaseDuplicado; }).length;
  var html = '<div style="border-top:1px solid var(--line);margin-top:12px;padding-top:12px;">';
  if(dupCount || nearCount){
    var msgs = [];
    if(dupCount) msgs.push(dupCount + ' jogo' + (dupCount===1?'':'s') + ' id\u00eantico' + (dupCount===1?'':'s') + ' a algo j\u00e1 cadastrado \u2014 n\u00e3o ser\u00e3o adicionados novamente.');
    if(nearCount) msgs.push(nearCount + ' jogo' + (nearCount===1?'':'s') + ' com apenas 1 dezena de diferen\u00e7a em rela\u00e7\u00e3o a um jogo j\u00e1 cadastrado \u2014 revise antes de confirmar.');
    html += '<div class="bl-note" style="margin-bottom:10px;">' + msgs.join(' ') + '</div>';
  }
  html += '<div class="bl-row" style="justify-content:space-between;margin-bottom:8px;">';
  html += '<label class="bl-check-toggle"><input type="checkbox" id="blSelectAllPreview" ' + (allChecked?'checked':'') + (selectable.length?'':' disabled') + ' /> Marcar todos (' + selectable.length + ' de ' + previewGames.length + ' dispon\u00edveis)</label>';
  html += '<button class="bl-btn" id="blCommitPreviewBtn" type="button">Adicionar marcados a Nossos Jogos</button>';
  html += '</div>';
  html += '<div style="max-height:340px;overflow:auto;">';
  previewGames.forEach(function(g, idx){
    html += '<div class="bl-preview-row ' + (g.duplicado?'dup':'') + '">';
    html += '<span class="bl-preview-idx">#' + (idx+1) + '</span>';
    if(g.duplicado){
      html += '<label class="bl-check-toggle"><input type="checkbox" disabled /></label>';
    } else {
      html += '<label class="bl-check-toggle"><input type="checkbox" class="blPreviewCheck" data-idx="' + idx + '" ' + (g.checked?'checked':'') + ' /></label>';
    }
    html += renderMiniBalls(g.numeros);
    if(g.duplicado){
      html += '<span class="bl-dup-badge">J\u00e1 existe</span>';
    } else if(g.quaseDuplicado){
      html += '<span class="bl-dup-badge" style="background:var(--gold-bg);color:#8F6B12;">Difere em 1 dezena</span>';
    } else {
      html += '<span class="bl-preview-meta">' + g.numeros.length + ' dezenas</span>';
    }
    html += '</div>';
  });
  html += '</div></div>';
  wrap.innerHTML = html;

  var selectAll = document.getElementById('blSelectAllPreview');
  if(selectAll){
    selectAll.addEventListener('change', function(){
      var v = this.checked;
      previewGames.forEach(function(g){ if(!g.duplicado) g.checked = v; });
      renderPreview();
    });
  }
  wrap.querySelectorAll('.blPreviewCheck').forEach(function(cb){
    cb.addEventListener('change', function(){
      previewGames[parseInt(this.dataset.idx)].checked = this.checked;
    });
  });
  document.getElementById('blCommitPreviewBtn').addEventListener('click', function(){
    var existingKeys = existingJogoKeys();
    var chosen = previewGames.filter(function(g){ return g.checked && !g.duplicado && !existingKeys.has(jogoKey(g.numeros)); });
    if(!chosen.length) return;
    var novos = chosen.map(function(g){
      return { id: 'j_' + Date.now() + '_' + Math.floor(Math.random()*10000), numeros: g.numeros, origem: previewOrigem, selecionado: true, criadoEm: new Date().toISOString() };
    });
    state.jogos = state.jogos.concat(novos);
    previewGames = [];
    state.jogosMsg = novos.length + ' jogo' + (novos.length===1?'':'s') + ' adicionado' + (novos.length===1?'':'s') + ' a Nossos Jogos.';
    updateHeader();
    renderJogos();
    saveJogos().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
  });
}

  }

function initPalpitePanel(){
  var nomeInput = document.getElementById('blPalpiteNome');
  if(!nomeInput) return;
  nomeInput.addEventListener('change', function(){
    palpiteNomeAtual = this.value;
    var wrap = document.getElementById('blPalpiteForm');
    if(wrap){ wrap.innerHTML = ''; }
    updatePalpiteCounter();
  });
  var toggleBtn = document.getElementById('blPalpiteToggleBtn');
  if(toggleBtn){
    toggleBtn.addEventListener('click', function(){
      togglePalpiteForm();
    });
  }
  updatePalpiteCounter();
}

function updatePalpiteCounter(){
  var temNome = !!palpiteNomeAtual.trim();
  var count = countPalpitesByName(palpiteNomeAtual);
  var atLimit = temNome && count >= 10;
  var countEl = document.getElementById('blPalpiteCount');
  if(countEl){ countEl.textContent = count + ' de 10 palpites cadastrados' + (temNome ? ' por ' + palpiteNomeAtual.trim() : ''); }
  var errEl = document.getElementById('blPalpiteLimitErr');
  if(errEl){ errEl.textContent = atLimit ? 'Voc\u00ea j\u00e1 atingiu o limite de 10 palpites com esse nome.' : ''; }
  var toggleBtn = document.getElementById('blPalpiteToggleBtn');
  if(toggleBtn){ toggleBtn.disabled = atLimit; }
  renderMeusPalpites();
}

function renderMeusPalpites(){
  var wrap = document.getElementById('blMeusPalpitesList');
  if(!wrap) return;
  var n = normName(palpiteNomeAtual);
  if(!n){ wrap.innerHTML = ''; return; }
  var all = state.jogos.filter(function(j){ return j.palpiteDe && normName(j.palpiteDe) === n; });
  if(!all.length){
    wrap.innerHTML = '<p class="bl-hint">Nenhum palpite cadastrado ainda com esse nome.</p>';
    return;
  }
  var pendentes = all.filter(function(j){ return !j.selecionado; })
    .sort(function(a,b){ return new Date(b.criadoEm) - new Date(a.criadoEm); });
  var oficiais = all.length - pendentes.length;
  var html = '';
  if(oficiais){
    html += '<p class="bl-hint" style="margin-bottom:8px;">\u2713 ' + oficiais + ' palpite' + (oficiais===1?'':'s') + ' seu' + (oficiais===1?'':'s') + ' j\u00e1 ' + (oficiais===1?'foi selecionado':'foram selecionados') + ' pelo organizador para a lista oficial do bol\u00e3o \u2014 sa\u00ed' + (oficiais===1?'u':'ram') + ' desta lista de palpites pendentes.</p>';
  }
  if(!pendentes.length){
    html += '<p class="bl-hint">Nenhum palpite pendente no momento' + (oficiais ? ' \u2014 todos os seus j\u00e1 est\u00e3o na lista oficial.' : '.') + '</p>';
    wrap.innerHTML = html;
    return;
  }
  html += '<p class="bl-hint" style="margin-bottom:8px;"><strong>Meus palpites pendentes (' + pendentes.length + ')</strong> \u2014 aguardando o organizador escolher os que v\u00e3o compor a lista oficial. Voc\u00ea pode remover qualquer um deles.</p>';
  pendentes.forEach(function(j){
    html += '<div class="bl-card">';
    html += '<div class="bl-row" style="justify-content:space-between;align-items:center;margin-bottom:8px;">';
    html += '<span class="bl-draw-date">' + j.numeros.length + ' dezenas \u00b7 ' + fmtDateTime(j.criadoEm) + '</span>';
    html += '<div class="bl-row" style="gap:6px;align-items:center;">';
    html += '<span class="bl-badge sel">\u2713 Dentro dos padr\u00f5es</span>';
    html += '<button class="bl-icon-del" data-id="' + j.id + '" data-action="del-meu-palpite" type="button" aria-label="Remover meu palpite">Remover</button>';
    html += '</div>';
    html += '</div>';
    html += renderMiniBalls(j.numeros);
    html += '</div>';
  });
  wrap.innerHTML = html;

  wrap.querySelectorAll('[data-action="del-meu-palpite"]').forEach(function(btn){
    btn.addEventListener('click', function(){
      var id = this.dataset.id;
      state.jogos = state.jogos.filter(function(j){ return j.id !== id; });
      updateHeader();
      updatePalpiteCounter();
      saveJogos().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
    });
  });
}

function togglePalpiteForm(){
  var wrap = document.getElementById('blPalpiteForm');
  if(wrap.innerHTML){ wrap.innerHTML = ''; return; }
  var nome = palpiteNomeAtual.trim();
  if(!nome){
    var errEl = document.getElementById('blPalpiteLimitErr');
    if(errEl){ errEl.textContent = 'Informe seu nome antes de montar o palpite.'; }
    return;
  }
  if(countPalpitesByName(nome) >= 10){
    var errEl2 = document.getElementById('blPalpiteLimitErr');
    if(errEl2){ errEl2.textContent = 'Voc\u00ea j\u00e1 atingiu o limite de 10 palpites com esse nome.'; }
    return;
  }
  pendingPalpiteNums = [];
  var html = '<div style="border-top:1px solid var(--line);margin-top:12px;padding-top:12px;">';
  html += '<div class="bl-field"><label>Marque de 15 a 20 n\u00fameros</label>';
  html += '<p class="bl-pick-count" id="blPalpitePickCount">0 selecionados</p>';
  html += '<div class="bl-pick-grid" id="blPalpitePickGrid"></div></div>';
  html += '<div class="bl-error" id="blPalpiteWarn" style="color:var(--gold);"></div>';
  html += '<div id="blPalpitePatterns"></div>';
  html += '<div class="bl-error" id="blPalpiteErr"></div>';
  html += '<div class="bl-row"><button class="bl-btn" id="blSavePalpiteBtn" type="button">Salvar palpite</button><button class="bl-btn secondary" id="blCancelPalpiteBtn" type="button">Cancelar</button></div>';
  html += '</div>';
  wrap.innerHTML = html;

  function checkPending(){
    var warnEl = document.getElementById('blPalpiteWarn');
    var saveBtn = document.getElementById('blSavePalpiteBtn');
    var patternsEl = document.getElementById('blPalpitePatterns');
    warnEl.textContent = '';
    patternsEl.innerHTML = '';
    saveBtn.disabled = false;
    if(pendingPalpiteNums.length < 15 || pendingPalpiteNums.length > 20) return;
    var exact = findExactDuplicate(pendingPalpiteNums);
    if(exact){
      warnEl.style.color = 'var(--danger)';
      warnEl.textContent = 'Esse jogo j\u00e1 est\u00e1 cadastrado em Nossos Jogos \u2014 n\u00e3o \u00e9 poss\u00edvel salvar um palpite id\u00eantico.';
      saveBtn.disabled = true;
      return;
    }
    var near = findNearDuplicate(pendingPalpiteNums);
    if(near){
      warnEl.style.color = '#8F6B12';
      warnEl.textContent = 'Aten\u00e7\u00e3o: esse palpite difere em apenas 1 dezena de um jogo j\u00e1 cadastrado. Voc\u00ea ainda pode salvar, mas revise antes.';
    }
    var check = checkParticipantPatterns(pendingPalpiteNums);
    if(check.apto){
      patternsEl.innerHTML = '<div class="bl-note" style="background:var(--sel-bg);border-color:var(--sel-line);color:var(--sel-text);">\u2713 Dentro das regras de padr\u00e3o (pares/\u00edmpares, sequ\u00eancias, moldura/miolo, primos e m\u00faltiplos de 3) \u2014 ' + escapeHtml(check.fonte) + '.</div>';
      saveBtn.disabled = false;
    } else {
      patternsEl.innerHTML = '<div class="bl-note" style="background:#FBEDED;border-color:#EAC9C9;color:var(--danger);"><strong>Fora das regras de padr\u00e3o</strong> \u2014 ' + escapeHtml(check.fonte) + ':<br>' + check.falhas.map(function(f){ return '\u2022 ' + escapeHtml(f); }).join('<br>') + '<br>Ajuste os n\u00fameros marcados para que o palpite fique apto a entrar no portif\u00f3lio.</div>';
      saveBtn.disabled = true;
    }
  }

  var grid = document.getElementById('blPalpitePickGrid');
  for(var n=1;n<=25;n++){
    var b = document.createElement('button');
    b.type='button'; b.className='bl-pick'; b.textContent=n; b.dataset.n=n;
    b.addEventListener('click', function(){
      var num = parseInt(this.dataset.n);
      var idx = pendingPalpiteNums.indexOf(num);
      if(idx>-1){ pendingPalpiteNums.splice(idx,1); this.classList.remove('sel'); }
      else{ pendingPalpiteNums.push(num); this.classList.add('sel'); }
      document.getElementById('blPalpitePickCount').textContent = pendingPalpiteNums.length + ' selecionados';
      checkPending();
    });
    grid.appendChild(b);
  }

  document.getElementById('blCancelPalpiteBtn').addEventListener('click', function(){ wrap.innerHTML=''; });

  document.getElementById('blSavePalpiteBtn').addEventListener('click', function(){
    var err = document.getElementById('blPalpiteErr');
    var nomeAtual = palpiteNomeAtual.trim();
    if(!nomeAtual){ err.textContent = 'Informe seu nome antes de salvar o palpite.'; return; }
    if(countPalpitesByName(nomeAtual) >= 10){ err.textContent = 'Voc\u00ea j\u00e1 atingiu o limite de 10 palpites com esse nome.'; return; }
    if(pendingPalpiteNums.length < 15 || pendingPalpiteNums.length > 20){
      err.textContent = 'Selecione de 15 a 20 n\u00fameros (voc\u00ea marcou ' + pendingPalpiteNums.length + ').'; return;
    }
    if(findExactDuplicate(pendingPalpiteNums)){
      err.textContent = 'Esse jogo j\u00e1 est\u00e1 cadastrado em Nossos Jogos.'; return;
    }
    var check = checkParticipantPatterns(pendingPalpiteNums);
    if(!check.apto){
      err.textContent = 'Este palpite n\u00e3o passou na checagem de padr\u00f5es (pares/\u00edmpares, sequ\u00eancias, moldura/miolo, primos ou m\u00faltiplos de 3) e por isso n\u00e3o pode entrar no portif\u00f3lio. Ajuste os n\u00fameros marcados acima.'; return;
    }
    err.textContent = '';
    var nums = pendingPalpiteNums.slice().sort(function(a,b){return a-b;});
    state.jogos.push({ id: 'j_' + Date.now() + '_' + Math.floor(Math.random()*1000), numeros: nums, origem: 'Palpite de ' + nomeAtual, palpiteDe: nomeAtual, selecionado: false, criadoEm: new Date().toISOString() });
    state.jogosMsg = 'Seu palpite passou na checagem de padr\u00f5es e foi cadastrado em Nossos Jogos.';
    wrap.innerHTML = '';
    updateHeader();
    renderJogos();
    saveJogos().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
  });
}
