  allSorted.forEach(function(j, i){ numberMap[j.id] = allSorted.length - i; });

  var jogos = allSorted;

  if(state.jogosFilter === 'selecionados') jogos = jogos.filter(function(j){ return j.selecionado; });
  if(state.jogosFilter === 'nao') jogos = jogos.filter(function(j){ return !j.selecionado; });

  if(filter){
    var filterNum = parseInt(filter, 10);
    jogos = jogos.filter(function(j){
      var numMatch = !isNaN(filterNum) && numberMap[j.id] === filterNum;
      var origemMatch = j.origem.toLowerCase().indexOf(filter) > -1;
      return numMatch || origemMatch;
    });
  }

  if(!jogos.length){
    list.innerHTML = '<div class="bl-empty">Nenhum jogo encontrado. ' + (state.unlocked ? 'Use o painel acima para importar ou montar um jogo.' : 'Peça ao organizador para adicionar jogos.') + '</div>';
    return;
  }

  var temResultado = !!(state.resultado && state.resultado.numeros);
  if(temResultado && state.jogosOrdem === 'acertos'){
    jogos = jogos.slice().sort(function(a,b){ return (contarAcertos(b.numeros)||0) - (contarAcertos(a.numeros)||0); });
  }

  var html = '';

  if(state.jogosViewMode === 'lista'){
    html += '<div style="overflow-x:auto;"><table class="bl-list-table"><thead><tr>';
    html += '<th>#</th><th>Dezenas</th><th>Status</th>';
    if(temResultado) html += '<th>Acertos</th>';
    if(state.unlocked) html += '<th></th>';
    html += '</tr></thead><tbody>';
    jogos.forEach(function(j){
      var num = numberMap[j.id];
      var acertos = temResultado ? contarAcertos(j.numeros) : null;
      html += '<tr>';
      html += '<td class="bl-num">#' + num + '</td>';
      html += '<td class="bl-list-dezenas">' + j.numeros.map(function(n){ return String(n).padStart(2,'0'); }).join(' ') + '</td>';
      html += '<td><span class="bl-list-status ' + (j.selecionado?'sel':'') + '">' + (j.selecionado ? 'Selecionado' : '\u2014') + '</span></td>';
      if(temResultado){
        html += '<td><span class="bl-list-acertos ' + (acertos>=11?'premio':'') + '">' + acertos + '</span></td>';
      }
      if(state.unlocked){
        html += '<td><div class="bl-row" style="gap:8px;flex-wrap:nowrap;align-items:center;">';
        html += '<label class="bl-check-toggle" title="Selecionado para o bol\u00e3o"><input type="checkbox" data-id="' + j.id + '" class="blSelToggle" ' + (j.selecionado?'checked':'') + ' /></label>';
        html += '<button class="bl-icon-del" data-id="' + j.id + '" data-action="del-jogo" type="button" aria-label="Remover jogo">Remover</button>';
        html += '</div></td>';
      }
      html += '</tr>';
    });
    html += '</tbody></table></div>';
    html += '<div class="bl-note" style="margin-top:12px;">Todos os ' + jogos.length + ' jogo(s) desta visualiza\u00e7\u00e3o, um por linha. Use "Ver participantes" acima para conferir quem est\u00e1 no bol\u00e3o.</div>';
  } else {
    jogos.forEach(function(j, idx){
      var num = numberMap[j.id];
      var acertos = temResultado ? contarAcertos(j.numeros) : null;
      html += '<div class="bl-card ' + (j.selecionado?'sel':'') + '">';
      html += '<div class="bl-draw-head"><div><span class="bl-draw-concurso">Jogo #' + num + '</span> <span class="bl-draw-date">\u00b7 ' + j.numeros.length + ' dezenas \u00b7 ' + escapeHtml(j.origem) + ' \u00b7 ' + fmtDateTime(j.criadoEm) + '</span></div>';
      html += '<div class="bl-row" style="gap:6px;">';
      if(temResultado){
        html += '<span class="bl-acertos-badge ' + (acertos>=11?'premio':'') + '">' + acertos + ' acerto' + (acertos===1?'':'s') + '</span>';
      }
      html += '<span class="bl-badge ' + (j.selecionado?'sel':'') + '">' + (j.selecionado ? 'Selecionado' : 'N\u00e3o selecionado') + '</span>';
      html += '</div></div>';
      var nearOther = findNearDuplicate(j.numeros, j.id);
      if(nearOther){
        html += '<div class="bl-note" style="margin:0 0 10px;padding:6px 10px;">Difere em apenas 1 dezena do Jogo #' + numberMap[nearOther.id] + '.</div>';
      }
      html += renderBallGrid(j.numeros, true);
      if(state.unlocked){
        html += '<div class="bl-row" style="margin-top:10px;align-items:center;">';
        html += '<label class="bl-check-toggle"><input type="checkbox" data-id="' + j.id + '" class="blSelToggle" ' + (j.selecionado?'checked':'') + ' /> Selecionado para o bol\u00e3o</label>';
        html += '<button class="bl-icon-del" data-id="' + j.id + '" data-action="del-jogo" type="button" aria-label="Remover jogo">Remover</button>';
        html += '</div>';
      }
      html += '</div>';
    });
  }
  list.innerHTML = html;

  if(state.unlocked){
    list.querySelectorAll('.blSelToggle').forEach(function(cb){
      cb.addEventListener('change', function(){
        var id = this.dataset.id;
        var jogo = state.jogos.find(function(j){ return j.id === id; });
        if(jogo){
          jogo.selecionado = this.checked;
          updateHeader();
          renderJogosList(document.getElementById('blSearchJogo').value.trim().toLowerCase());
          renderMeusPalpites();
          saveJogos().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
        }
      });
    });
    list.querySelectorAll('[data-action="del-jogo"]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = this.dataset.id;
        state.jogos = state.jogos.filter(function(j){ return j.id !== id; });
        updateHeader();
        renderJogosList(document.getElementById('blSearchJogo').value.trim().toLowerCase());
        saveJogos().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
      });
    });
  }
}

function renderParticipantes(){
  var totalCotas = state.participants.reduce(function(s,p){ return s + p.cotas; }, 0);
  var cotaFmt = formatMoney(state.cotaValor);
  var html = '';
  html += '<div class="bl-stats">';
  html += '<div class="bl-stat"><p class="bl-stat-label">Participantes</p><p class="bl-stat-val">' + state.participants.length + '</p></div>';
  html += '<div class="bl-stat"><p class="bl-stat-label">Total de cotas</p><p class="bl-stat-val">' + totalCotas + '</p></div>';
  html += '<div class="bl-stat"><p class="bl-stat-label">Valor da cota</p><p class="bl-stat-val">' + (cotaFmt || 'A definir') + '</p></div>';
  html += '</div>';

  if(state.unlocked){
    var cotaValorInputVal = (state.cotaValor !== null && state.cotaValor !== undefined) ? state.cotaValor.toFixed(2) : '';
    html += '<div class="bl-panel"><h3>Valor da cota</h3><p class="bl-hint">Defina quanto cada cota custa. Esse valor aparece para todo mundo no card acima.</p>';
    html += '<div class="bl-field"><label>Valor por cota (R$)</label><input class="bl-input" id="blCotaValorInput" type="number" min="0" step="0.01" inputmode="decimal" placeholder="Ex: 15.00" value="' + cotaValorInputVal + '" /></div>';
    if(state.cotaValorErr){ html += '<div class="bl-error">' + escapeHtml(state.cotaValorErr) + '</div>'; }
    html += '<button class="bl-btn" id="blCotaValorSave" type="button">Salvar valor da cota</button></div>';

    html += '<div class="bl-panel"><h3>Cadastrar participante</h3>';
    html += '<div class="bl-field"><label>Nome do participante</label><input class="bl-input" id="blPName" placeholder="Nome completo" /></div>';
    html += '<div class="bl-field"><label>Quantidade de cotas adquiridas</label><input class="bl-input" id="blPCotas" type="number" min="1" step="1" placeholder="1" /></div>';
    html += '<div class="bl-error" id="blPErr"></div>';
    html += '<button class="bl-btn" id="blAddPartBtn" type="button">+ Adicionar participante</button>';
    html += '</div>';
  } else {
    html += '<div class="bl-note">Somente o organizador pode cadastrar participantes e definir a quantidade de cotas. Toque em "Sou o organizador" acima para desbloquear.</div>';
  }

  html += '<div id="blPartList"></div>';

  var body = document.getElementById('blBody');
  body.innerHTML = html;

  renderPartList();

  var cotaValorBtn = document.getElementById('blCotaValorSave');
  if(cotaValorBtn){
    cotaValorBtn.addEventListener('click', function(){
      var raw = document.getElementById('blCotaValorInput').value.replace(',', '.').trim();
      var val = parseFloat(raw);
      if(!raw || isNaN(val) || val < 0){ state.cotaValorErr = 'Informe um valor v\u00e1lido para a cota.'; renderParticipantes(); return; }
      state.cotaValorErr = '';
      state.cotaValor = val;
      renderParticipantes();
      window.storage.set('cotaValor', String(val), true).catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
    });
  }

  var addBtn = document.getElementById('blAddPartBtn');
  if(addBtn){
    addBtn.addEventListener('click', function(){
      var err = document.getElementById('blPErr');
      var name = document.getElementById('blPName').value.trim();
      var cotas = parseInt(document.getElementById('blPCotas').value);
      if(!name){ err.textContent = 'Informe o nome do participante.'; return; }
      if(!cotas || cotas < 1){ err.textContent = 'Informe uma quantidade de cotas v\u00e1lida (m\u00ednimo 1).'; return; }
      var p = { id: 'p_' + Date.now() + '_' + Math.floor(Math.random()*1000), nome: name, cotas: cotas, criadoEm: new Date().toISOString() };
      state.participants.push(p);
      err.textContent = '';
      updateHeader();
      renderParticipantes();
      saveParticipants().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
    });
  }
}

function renderPartList(){
  var list = document.getElementById('blPartList');
  if(!state.participants.length){
    list.innerHTML = '<div class="bl-empty">Nenhum participante cadastrado ainda.</div>';
    return;
  }
  var sorted = state.participants.slice().sort(function(a,b){ return a.nome.localeCompare(b.nome, 'pt-BR', {sensitivity:'base'}); });
  var html = '';
  sorted.forEach(function(p){
    html += '<div class="bl-participant"><div><p class="bl-p-name">' + escapeHtml(p.nome) + '</p><p class="bl-p-meta">Cadastrado em ' + fmtDateTime(p.criadoEm) + '</p></div><div style="display:flex;align-items:center;gap:10px;"><span class="bl-p-cotas bl-num">' + p.cotas + (p.cotas===1?' cota':' cotas') + '</span>';
    if(state.unlocked){
      html += '<button class="bl-icon-del" data-id="' + p.id + '" type="button" aria-label="Remover participante">Remover</button>';
    }
    html += '</div></div>';
  });
  list.innerHTML = html;

  if(state.unlocked){
    list.querySelectorAll('.bl-icon-del[data-id]').forEach(function(btn){
      btn.addEventListener('click', function(){
        var id = this.dataset.id;
        state.participants = state.participants.filter(function(p){ return p.id !== id; });
        updateHeader();
        renderParticipantes();
        saveParticipants().catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
      });
    });
  }
}

function renderLockModal(mode){
  var wrapHtml = '<div class="bl-modal-wrap">';
  wrapHtml += '<div class="bl-modal">';
  if(mode === 'create'){
    wrapHtml += '<h4>Criar PIN de organizador</h4><p>Ainda n\u00e3o h\u00e1 um PIN definido para este bol\u00e3o. Crie um c\u00f3digo de 4 a 6 d\u00edgitos para proteger o cadastro de jogos e participantes. Depois de entrar, este navegador fica conectado como organizador at\u00e9 voc\u00ea sair manualmente.</p>';
    wrapHtml += '<div class="bl-field"><label>Novo PIN</label><input class="bl-input" id="blPinNew" type="password" inputmode="numeric" maxlength="6" /></div>';
    wrapHtml += '<div class="bl-field"><label>Confirmar PIN</label><input class="bl-input" id="blPinConfirm" type="password" inputmode="numeric" maxlength="6" /></div>';
  } else {
    wrapHtml += '<h4>Entrar como organizador</h4><p>Digite o PIN do organizador para liberar o cadastro de jogos e participantes. Este navegador vai continuar conectado at\u00e9 voc\u00ea sair manualmente.</p>';
    wrapHtml += '<div class="bl-field"><label>PIN</label><input class="bl-input" id="blPinEnter" type="password" inputmode="numeric" maxlength="6" /></div>';
  }
  wrapHtml += '<div class="bl-error" id="blPinErr"></div>';
  wrapHtml += '<div class="bl-row"><button class="bl-btn" id="blPinOk" type="button">' + (mode==='create' ? 'Criar e entrar' : 'Entrar') + '</button><button class="bl-btn secondary" id="blPinCancel" type="button">Cancelar</button></div>';
  wrapHtml += '</div></div>';

  document.body.appendChild(el(wrapHtml));
  var modalEl = document.body.lastChild;
  var errEl = document.getElementById('blPinErr');
  var firstInput = mode === 'create' ? document.getElementById('blPinNew') : document.getElementById('blPinEnter');
  if(firstInput){ firstInput.focus(); }

  modalEl.addEventListener('click', function(e){ if(e.target === modalEl){ modalEl.remove(); } });
  document.getElementById('blPinCancel').addEventListener('click', function(){ modalEl.remove(); });

  document.getElementById('blPinOk').addEventListener('click', function(){
    if(mode === 'create'){
      var pin1 = document.getElementById('blPinNew').value.trim();
      var pin2 = document.getElementById('blPinConfirm').value.trim();
      if(pin1.length < 4){ errEl.textContent = 'O PIN deve ter pelo menos 4 d\u00edgitos.'; return; }
      if(pin1 !== pin2){ errEl.textContent = 'Os PINs n\u00e3o coincidem.'; return; }
      state.organizerPin = pin1;
      state.unlocked = true;
      modalEl.remove();
      updateHeader();
      renderTabBody();
      window.storage.set('organizerPin', pin1, true).catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
      window.storage.set('organizerSession', 'unlocked', false).catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
    } else {
      var pin = document.getElementById('blPinEnter').value.trim();
      if(pin === state.organizerPin){
        state.unlocked = true;
        modalEl.remove();
        updateHeader();
        renderTabBody();
        window.storage.set('organizerSession', 'unlocked', false).catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
      } else {
        errEl.textContent = 'PIN incorreto.';
      }
    }
  });
}

function renderTabBody(){
  if(state.tab === 'gerador') renderGerador();
  else if(state.tab === 'jogos') renderJogos();
  else if(state.tab === 'palpites') renderPalpites();
  else renderParticipantes();
}

function switchToTab(tabName){
  document.querySelectorAll('.bl-tab').forEach(function(t){ t.classList.toggle('active', t.dataset.tab === tabName); });
  state.tab = tabName;
  renderTabBody();
  renderNotice();
  if(tabName === 'gerador') autoCheckGeradorHistory();
}

// Busca o concurso mais recente automaticamente sempre que a aba "Gerador de
// jogos" \u00e9 aberta \u2014 n\u00e3o h\u00e1 mais bot\u00e3o manual para isso. Roda em segundo
// plano: se n\u00e3o houver concurso novo ou a consulta falhar (instabilidade/
// bloqueio de rede), a tela permanece como estava, sem erro vis\u00edvel.
function autoCheckGeradorHistory(){
  var msgEl = document.getElementById('gnCheckLatestMsg');
  if(msgEl) msgEl.textContent = 'Verificando concurso mais recente...';
  fetchLatestConcursoOficial().then(function(draw){
    if(!draw){
      if(msgEl) msgEl.textContent = '';
      return;
    }
    var isNew = addOfficialDraw(draw);
    window.storage.set('officialLastAutoCheck', new Date().toISOString().slice(0,10), true).catch(function(){});
    if(isNew){
      renderGerador();
      var newMsgEl = document.getElementById('gnCheckLatestMsg');
      if(newMsgEl) newMsgEl.textContent = 'Concurso ' + draw.concurso + ' (' + fmtDateTime(draw.data) + ') adicionado automaticamente aos dados oficiais.';
    } else if(msgEl){
      msgEl.textContent = '';
    }
  }).catch(function(){
    if(msgEl) msgEl.textContent = '';
  });
}

function syncLockbarSpacer(){
  var bar = document.getElementById('blLockbar');
  var spacer = document.getElementById('blLockbarSpacer');
  if(bar && spacer){ spacer.style.height = bar.offsetHeight + 'px'; }
}

function render(){
  updateHeader();
  renderTabBody();
  renderNotice();
  syncLockbarSpacer();
}

document.querySelectorAll('.bl-tab').forEach(function(tab){
  tab.addEventListener('click', function(){
    switchToTab(this.dataset.tab);
  });
});

function applyAppTitle(){
  var eyebrowEl = document.getElementById('blEyebrow');
  var titleEl = document.getElementById('blTitle');
  if(eyebrowEl) eyebrowEl.textContent = state.appTitle.eyebrow;
  if(titleEl) titleEl.textContent = state.appTitle.title;
}

function renderEditTitleForm(){
  var wrap = document.getElementById('blEditTitleForm');
  if(!wrap) return;
  if(!state.unlocked || !state.appTitleEditing){
    wrap.style.display = 'none';
    wrap.innerHTML = '';
    return;
  }
  wrap.style.display = 'block';
  var html = '<div class="bl-field"><label>Categoria (texto pequeno acima)</label><input class="bl-input" id="blEyebrowInput" value="' + escapeHtml(state.appTitle.eyebrow) + '" maxlength="40" /></div>';
  html += '<div class="bl-field"><label>Nome do bol\u00e3o</label><input class="bl-input" id="blTitleInput" value="' + escapeHtml(state.appTitle.title) + '" maxlength="60" /></div>';
  if(state.appTitleErr){ html += '<div class="bl-error">' + escapeHtml(state.appTitleErr) + '</div>'; }
  html += '<div class="bl-row"><button class="bl-btn" id="blTitleSaveBtn" type="button">Salvar</button><button class="bl-btn secondary" id="blTitleCancelBtn" type="button">Cancelar</button></div>';
  wrap.innerHTML = html;

  document.getElementById('blTitleSaveBtn').addEventListener('click', function(){
    var eyebrowVal = document.getElementById('blEyebrowInput').value.trim();
    var titleVal = document.getElementById('blTitleInput').value.trim();
    if(!eyebrowVal || !titleVal){
      state.appTitleErr = 'Preencha os dois campos.';
      renderEditTitleForm();
      return;
    }
    state.appTitleErr = '';
    state.appTitle = { eyebrow: eyebrowVal, title: titleVal };
    state.appTitleEditing = false;
    applyAppTitle();
    renderEditTitleForm();
    window.storage.set('appTitle', JSON.stringify(state.appTitle), true).catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
  });
  document.getElementById('blTitleCancelBtn').addEventListener('click', function(){
    state.appTitleEditing = false;
    state.appTitleErr = '';
    renderEditTitleForm();
  });
}

document.getElementById('blEditTitleBtn').addEventListener('click', function(){
  state.appTitleEditing = !state.appTitleEditing;
  state.appTitleErr = '';
  renderEditTitleForm();
});

document.getElementById('blLockBtn').addEventListener('click', function(){
  if(state.unlocked){
    state.unlocked = false;
    state.appTitleEditing = false;
    updateHeader();
    renderEditTitleForm();
    renderTabBody();
    window.storage.delete('organizerSession', false).catch(function(e){ console.error('Erro ao salvar no Firestore:', e); });
    return;
  }
  if(state.organizerPin){
    renderLockModal('enter');
  } else {
    renderLockModal('create');
  }
});

loadData();
window.addEventListener('resize', syncLockbarSpacer);
})();
</script>
